name: N_New_Job_Automation_Bot

on:
  schedule:
    - cron: '0 0 * * *' # 매일 한국 시간 아침 9시 자동 가동
  workflow_dispatch: # 수동 실행 [Run workflow] 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 소스코드 가져오기
      uses: actions/checkout@v4

    - name: 파이썬 설치하기
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 필수 라이브러리 설치하기
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 google-generativeai pandas openpyxl Pillow

    # -----------------------------------------------------------------
    # [독립 봇 가동 파트] 각 로봇들이 자기 파일로 데이터를 긁어모읍니다.
    # -----------------------------------------------------------------
    - name: 1. 사람인 전용 로봇 가동
      run: |
        cd .github/workflows
        python N_saramin_bot.py

    - name: 2. 잡코리아 전용 로봇 가동
      run: |
        cd .github/workflows
        python N_jobkorea_bot.py

    - name: 3. 피플앤잡 전용 로봇 가동
      run: |
        cd .github/workflows
        python N_peoplenjob_bot.py

    # -----------------------------------------------------------------
    # [통합 및 AI 필터링 파트] 수집된 데이터 중복 제거 후 AI 분석 및 발송
    # -----------------------------------------------------------------
    - name: 4. AI 거름망 가동 및 텔레그램 배달
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        cd .github/workflows
        python N_ai_consolidator.py
