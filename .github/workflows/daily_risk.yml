name: 📊 Daily Stock Risk Monitor

on:
  schedule:
    # 월~금 한국시간 오전 7시 (UTC 전날 22:00)
    - cron: '0 22 * * 0-4'
  workflow_dispatch:

jobs:
  run-risk-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🔍 파일 구조 확인
        run: |
          echo "===== 레포 루트 ====="
          ls -la
          echo ""
          echo "===== stock_risk_monitor ====="
          ls -la stock_risk_monitor/ || echo "❌ 폴더 없음"

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 패키지 설치
        run: |
          pip install --upgrade pip
          pip install yfinance fredapi requests pandas

      - name: 🔑 Secrets 확인
        env:
          T1: ${{ secrets.TELEGRAM_ETF_TOKEN }}
          T2: ${{ secrets.TELEGRAM_ETF_CHAT_ID }}
          T3: ${{ secrets.FRED_API_KEY }}
          T4: ${{ secrets.DART_API_KEY }}
          T5: ${{ secrets.GEMINI_API_KEY }}
        run: |
          [ -n "$T1" ] && echo "✅ TELEGRAM_ETF_TOKEN"   || echo "❌ TELEGRAM_ETF_TOKEN 없음"
          [ -n "$T2" ] && echo "✅ TELEGRAM_ETF_CHAT_ID" || echo "❌ TELEGRAM_ETF_CHAT_ID 없음"
          [ -n "$T3" ] && echo "✅ FRED_API_KEY"         || echo "❌ FRED_API_KEY 없음"
          [ -n "$T4" ] && echo "✅ DART_API_KEY"         || echo "❌ DART_API_KEY 없음"
          [ -n "$T5" ] && echo "✅ GEMINI_API_KEY"       || echo "❌ GEMINI_API_KEY 없음"

      - name: 🚀 리스크 분석 실행
        working-directory: stock_risk_monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_ETF_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_ETF_CHAT_ID }}
          FRED_API_KEY:       ${{ secrets.FRED_API_KEY }}
          DART_API_KEY:       ${{ secrets.DART_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL:       "gemini-3.5-flash"
          ALERT_ON_RISK:      "true"
        run: python main.py --now

      - name: ❌ 실패 시 텔레그램 알림
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_ETF_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_ETF_CHAT_ID }}
          REPO:               ${{ github.repository }}
        run: |
          pip install requests -q
          python -c "
          import os, requests
          token = os.environ['TELEGRAM_BOT_TOKEN']
          chat  = os.environ['TELEGRAM_CHAT_ID']
          repo  = os.environ['REPO']
          msg   = f'⚠️ 리스크 모니터 실행 실패\nhttps://github.com/{repo}/actions'
          requests.post(f'https://api.telegram.org/bot{token}/sendMessage',
                        json={'chat_id': chat, 'text': msg})
          "
