name: daily-job-bot

# 매일 아침 08:00 KST (= 23:00 UTC 전날) 자동 실행 + 수동 실행 버튼
on:
  schedule:
    - cron: "0 23 * * *"      # UTC 기준. 08:00 KST = 23:00 UTC. 시간 바꾸려면 여기 수정.
  workflow_dispatch:           # Actions 탭에서 수동 실행 가능

# 실행 후 갱신된 CSV/기록 파일을 저장소에 되커밋하기 위해 쓰기 권한 필요
permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run daily pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run_daily.py

      - name: Commit updated data (누적/기록 상태 유지)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "daily update $(date +'%Y-%m-%d')" || echo "변경 없음"
          git push
