name: Run Job Automation Bot

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 소스코드 가져오기
      uses: actions/checkout@v3

     Tar파이썬 설치하기
    - name: 파이썬 설치하기
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 필수 라이브러리 설치하기
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 google-generativeai

    # [.github/workflows 폴더 안으로 직접 진입해서 실행하도록 고정]
    - name: 메인 프로그램 실행해서 텔레그램으로 배달하기
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SARAMIN_KEY: ${{ secrets.SARAMIN_KEY }}
        GOYONG_KEY: ${{ secrets.GOYONG_KEY }}
      run: |
        cd .github/workflows
        python main.py
