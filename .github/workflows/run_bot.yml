name: Run Job Automation Bot

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 소스코드 가져오기
      uses: actions/checkout@v3

    # 파이썬을 가장 안정적인 경로에서 기본 설치합니다.
    - name: 파이썬 설치하기
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 라이브러리를 충돌 없이 한 번에 다운로드합니다.
    - name: 필수 라이브러리 설치하기
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 google-generativeai

    # [핵심 수정] 이름표 꼬임 방지 및 폴더 위치 강제 고정 실행
    - name: 메인 프로그램 실행해서 텔레그램으로 배달하기
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SARAMIN_KEY: ${{ secrets.SARAMIN_KEY }}
        GOYONG_KEY: ${{ secrets.GOYONG_KEY }}
      run: |
        # 현재 위치에 main.py가 없다면 하위 폴더를 찾아서 바깥으로 꺼내옵니다.
        if [ ! -f "main.py" ]; then
          echo "📂 main.py 위치 재조정 중..."
          TARGET_DIR=$(find . -name "main.py" -exec dirname {} \;)
          cp -r $TARGET_DIR/* .
        fi
        
        # 준비가 완료되면 메인 프로그램을 실행합니다.
        python main.py
