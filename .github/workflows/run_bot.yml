name: Run Job Automation Bot

on:
  schedule:
    # UTC 00:00 = 한국시간(KST) 오전 9시. (Actions 부하로 수 분~수십 분 지연 가능)
    - cron: '0 0 * * *'
  workflow_dispatch:  # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 소스코드 가져오기
      uses: actions/checkout@v4

    - name: 파이썬 설치하기
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 필수 라이브러 설치하기
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 google-generativeai pandas openpyxl

    - name: 메인 프로그램 실행
      env:
        # 중복된 TELEGRAM_TOKEN은 제거하고 깔끔하게 1:1 매칭
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SARAMIN_KEY: ${{ secrets.SARAMIN_KEY }}
        GOYONG_KEY: ${{ secrets.GOYONG_KEY }}
      run: |
        cd .github/workflows
        python main.py
