name: Run Job Automation Bot

on:
  workflow_dispatch: # 👈 우측에 [Run workflow] 수동 버튼을 강제로 소환하는 핵심 명령어입니다!

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 소스코드 가져오기
      uses: actions/checkout@v3

    - name: 파이썬 설치하기
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 필수 라이브러리 설치하기
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 google-generativeai

    - name: 메인 프로그램 실행해서 텔레그램으로 배달하기
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SARAMIN_KEY: ${{ secrets.SARAMIN_KEY }}
        GOYONG_KEY: ${{ secrets.GOYONG_KEY }}
      run: |
        # 파일들이 모여있는 폴더로 직접 들어가서 안전하게 main.py를 실행합니다.
        cd .github/workflows
        python main.py
