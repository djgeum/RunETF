name: Run Job Automation Bot

on:
  schedule:
    # 매일 아침 9시 자동 실행 (UTC 00:00 = 한국 시간 09:00)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 우리가 원할 때 언제든 수동으로 실행할 수 있는 버튼을 만듭니다.

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1단계: 깃허브 저장소에 있는 소스코드를 가상 컴퓨터로 통째로 다운로드합니다.
    - name: 소스코드 가져오기
      uses: actions/checkout@v3

    # 2단계: 가상 컴퓨터에 파이썬(Python 3.10)을 설치합니다.
    - name: 파이썬 설치하기
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3단계: 우리 프로그램에 필요한 필수 도구(라이브러리)들을 설치합니다.
    - name: 필수 라이브러리 설치하기
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 google-generativeai

    # 4단계: 메인 프로그램을 실행해서 텔레그램 채널로 배달합니다.
    # [수정포인트] 파일이 하위 폴더에 숨어있어도 무조건 찾아내서 실행하도록 경로를 보완했습니다.
    - name: 메인 프로그램 실행해서 텔레그램으로 배달하기
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SARAMIN_KEY: ${{ secrets.SARAMIN_KEY }}
        GOYONG_KEY: ${{ secrets.GOYONG_KEY }}
      run: |
        if [ -f "main.py" ]; then
          python main.py
        elif [ -f "RunETF/main.py" ]; then
          cd RunETF && python main.py
        else
          python $(find . -name "main.py" | head -n 1)
        fi
