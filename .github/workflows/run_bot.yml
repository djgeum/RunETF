name: Run Job Automation Bot

# 깃허브에게 수동 실행 버튼을 강제로 그리라고 명령하는 핵심 구간입니다.
on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 소스코드 가져오기
      uses: actions/checkout@v3

    - name: 파이썬 설치하기
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 필수 라이브러리 설치하기
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 google-generativeai

    # 현재 파일들이 어느 구석에 박혀있든 알아서 main.py를 조준 사격해서 켭니다.
    - name: 메인 프로그램 실행해서 텔레그램으로 배달하기
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SARAMIN_KEY: ${{ secrets.SARAMIN_KEY }}
        GOYONG_KEY: ${{ secrets.GOYONG_KEY }}
      run: |
        TARGET_DIR=$(find . -name "main.py" -exec dirname {} \;)
        cd "$TARGET_DIR"
        python main.py
