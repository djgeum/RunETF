name: Run Job Automation Bot

on:
  workflow_dispatch: # 수동 실행 [Run workflow] 버튼을 활성화합니다.

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 소스코드 가져오기
      uses: actions/checkout@v3

    - name: 파이썬 설치하기
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 필수 라이브러리 설치하기
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 google-generativeai

    # [핵심 수정] 루트 폴더 기준에서 .github/workflows 안에 있는 main.py를 조준 사격하여 실행합니다.
    - name: 메인 프로그램 실행해서 텔레그램으로 배달하기
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SARAMIN_KEY: ${{ secrets.SARAMIN_KEY }}
        GOYONG_KEY: ${{ secrets.GOYONG_KEY }}
      run: |
        python .github/workflows/main.py
